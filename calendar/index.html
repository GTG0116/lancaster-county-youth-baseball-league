<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Calendar · Lancaster County Youth Baseball League</title>
<meta name="description" content="Month-by-month LCYBL game calendar. Each game is labeled with its age group and section, updated automatically." />
<link rel="icon" href="../icon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="../_next/static/css/65f8654b9a88dcf2.css" />
<link rel="stylesheet" href="../assets/site.css" />
</head>
<body>
<div data-lc-header></div>
<main class="lc-main">
  <section class="lc-hero">
    <div class="lc-wrap">
      <span class="lc-eyebrow">Plan ahead</span>
      <h1>Game Calendar</h1>
      <p>Every game by month — each one tagged with its age group and section so you always know which game is which.</p>
    </div>
  </section>

  <section class="lc-section">
    <div class="lc-wrap">
      <div class="lc-card lc-card-pad" style="margin-bottom:18px">
        <div style="margin-bottom:12px"><span class="lc-label">Age group</span><div class="lc-pillrow" id="f-div"></div></div>
        <div><span class="lc-label">Section</span><div class="lc-pillrow" id="f-sec"></div></div>
      </div>

      <div class="lc-calbar">
        <button class="lc-btn" id="prev">← Prev</button>
        <h2 id="cal-title" style="margin:0"></h2>
        <button class="lc-btn" id="next">Next →</button>
      </div>

      <div class="lc-calgrid" id="cal-dow"></div>
      <div class="lc-calgrid" id="cal-grid" style="margin-top:6px"></div>

      <div id="cal-detail" style="margin-top:22px"></div>
      <div class="lc-loading" id="lc-loading">Loading the latest calendar…</div>
    </div>
  </section>
</main>
<div data-lc-footer></div>

<script>window.LCYBL_PAGE="calendar";</script>
<script src="../assets/site.js"></script>
<script src="../assets/calendar.js"></script>
</body>
</html>
