<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Schedule &amp; Scores · Lancaster County Youth Baseball League</title>
<meta name="description" content="Every LCYBL game — upcoming matchups and final scores across all age groups and sections, always up to date." />
<link rel="icon" href="../icon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="../_next/static/css/65f8654b9a88dcf2.css" />
<link rel="stylesheet" href="../assets/site.css" />
</head>
<body>
<div data-lc-header></div>
<main class="lc-main">
  <section class="lc-hero">
    <div class="lc-wrap">
      <span class="lc-eyebrow">Compete</span>
      <h1>Schedule &amp; Scores</h1>
      <p>Every game across 10U, 12U and 14U — upcoming matchups and final results, updated automatically from the league's official sheets.</p>
      <p class="lc-updated" id="lc-updated"></p>
    </div>
  </section>

  <section class="lc-section">
    <div class="lc-wrap">
      <div class="lc-card lc-card-pad" style="margin-bottom:22px">
        <div style="margin-bottom:14px"><span class="lc-label">Age group</span><div class="lc-pillrow" id="f-div"></div></div>
        <div style="margin-bottom:14px"><span class="lc-label">Section</span><div class="lc-pillrow" id="f-sec"></div></div>
        <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end">
          <div style="flex:1;min-width:200px"><span class="lc-label">Find a team</span><input class="lc-field" id="f-team" placeholder="e.g. Warwick, E-Town…" /></div>
          <div><span class="lc-label">Show</span><div class="lc-pillrow" id="f-when"></div></div>
        </div>
      </div>
      <div id="lc-list"></div>
      <div class="lc-loading" id="lc-loading">Loading the latest schedule…</div>
    </div>
  </section>
</main>
<div data-lc-footer></div>

<script>window.LCYBL_PAGE="schedule";</script>
<script src="../assets/site.js"></script>
<script src="../assets/schedule.js"></script>
</body>
</html>
