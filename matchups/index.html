<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Matchups · Lancaster County Youth Baseball League</title>
<meta name="description" content="Build a head-to-head matchup between any two LCYBL teams — see their record against each other and every game they've played." />
<link rel="icon" href="../icon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="../_next/static/css/65f8654b9a88dcf2.css" />
<link rel="stylesheet" href="../assets/site.css" />
</head>
<body>
<div data-lc-header></div>
<main class="lc-main">
  <section class="lc-hero">
    <div class="lc-wrap">
      <span class="lc-eyebrow">Head to head</span>
      <h1>Matchups</h1>
      <p>Pick any two teams to see how they stack up — their record against each other and every game they've played.</p>
    </div>
  </section>

  <section class="lc-section">
    <div class="lc-wrap">
      <div class="lc-card lc-card-pad" style="margin-bottom:22px">
        <div style="display:grid;gap:14px;grid-template-columns:1fr auto 1fr;align-items:end" id="pickrow">
          <div><span class="lc-label">Team A</span><input class="lc-field" id="teamA" list="teamlist" placeholder="Pick a team…" /></div>
          <div style="font-weight:900;color:var(--muted);padding-bottom:10px">VS</div>
          <div><span class="lc-label">Team B</span><input class="lc-field" id="teamB" list="teamlist" placeholder="Pick a team…" /></div>
        </div>
        <datalist id="teamlist"></datalist>
      </div>
      <div id="lc-result"></div>
      <div class="lc-loading" id="lc-loading">Loading the latest data…</div>
    </div>
  </section>
</main>
<div data-lc-footer></div>

<script>window.LCYBL_PAGE="matchups";</script>
<script src="../assets/site.js"></script>
<script src="../assets/matchups.js"></script>
</body>
</html>
