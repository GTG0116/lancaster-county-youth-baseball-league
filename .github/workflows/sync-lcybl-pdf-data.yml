name: Sync LCYBL PDF data

on:
  schedule:
    # Refresh every morning during the season. Times are UTC.
    - cron: "20 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-lcybl-pdf-data
  cancel-in-progress: false

jobs:
  sync:
    name: Parse official PDFs and update static data
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install parser dependencies
        run: python -m pip install -r requirements-lcybl-sync.txt

      - name: Download, parse, and patch static site data
        run: python scripts/sync_lcybl_pdf_data.py --patch-static --require-complete --debug-dump-dir /tmp/lcybl-pdf-debug

      - name: Upload parser debug output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lcybl-pdf-parser-debug
          path: /tmp/lcybl-pdf-debug
          if-no-files-found: ignore

      - name: Commit updated data
        run: |
          if git diff --quiet; then
            echo "No LCYBL PDF data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated _next/static/chunks/app/schedule _next/static/chunks/app/standings schedule/index.html standings/index.html schedule/index.txt standings/index.txt
          git commit -m "Update LCYBL data from official PDFs"
          git push
